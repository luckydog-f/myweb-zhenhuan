    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'SimSun', serif; background: linear-gradient(135deg, #f5e6e8 0%, #f0d9da 50%, #e8ccd3 100%); color: #333; min-height: 100vh; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(160, 82, 82, 0.3); border: 3px solid #a05252; position: relative; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #a05252, #d4af37, #a05252); z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 2px solid rgba(160, 82, 82, 0.2); }
        .header h1 { color: #a05252; font-size: 2.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1); }
        .main-character { text-align: center; margin-bottom: 40px; padding: 30px; background: linear-gradient(135deg, rgba(160, 82, 82, 0.1) 0%, rgba(212, 175, 55, 0.1) 100%); border-radius: 20px; border: 2px solid #a05252; }

        .character-tagline { font-size: 1.4rem; color: #d4af37; font-style: italic; margin-bottom: 20px; }

        .similarity-percent { font-size: 2.2rem; font-weight: bold; color: #d4af37; }
        .similarity-level { font-size: 1.2rem; color: #a05252; font-weight: bold; margin-top: 5px; }

        .chart-wrapper { height: 400px; width: 100%; }
        .similar-characters { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 40px 0; }
        .similar-character { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); border-left: 4px solid #d4af37; }

        .comparison-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); border-top: 4px solid #d4af37; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {

            .similar-characters, .dimensions-grid, .comparison-grid { grid-template-columns: 1fr; }

        }

</head>
<body>

                    <div class="comparison-card"><h3 style="color:#a05252;margin-bottom:15px;">擅长与不擅长</h3><div id="strengthsWeaknesses"></div></div>

            </div>

                    <i class="fas fa-camera"></i> 分享命书

    </div>
    <script>
        // 维度名称映射
        const dimensionNames = {

            'E': '外倾性',

            'E': 'fas fa-users',
            'A': 'fas fa-heart',
            'N': 'fas fa-brain'
        };

        // 角色数据库 - 11个主要角色（使用您提供的完整数据）
        const characterProfiles = {
            "前期甄嬛·莞嫔": { tagline:"逆风如解意，容易莫摧残。", theme_color:"#E74C8C", dimension_scores:{O:16,C:12,E:14,A:18,N:8} },
            "后期甄嬛·熹贵妃": { tagline:"往事暗沉不可追，来日之路光明灿烂。", theme_color:"#8B0000", dimension_scores:{O:17,C:18,E:15,A:10,N:6} },
            "沈眉庄": { tagline:"宁可枝头抱香死，何曾吹落北风中。", theme_color:"#4A90E2", dimension_scores:{O:12,C:19,E:13,A:19,N:5} },
            "皇后宜修": { tagline:"臣妾做不到啊！", theme_color:"#2C3E50", dimension_scores:{O:10,C:20,E:11,A:4,N:18} },

            "敬妃": { tagline:"本宫与皇上是多年的情分，不必计较。", theme_color:"#F39C12", dimension_scores:{O:10,C:15,E:13,A:18,N:9} },
            "浣碧": { tagline:"这世间，谁又比谁高贵呢？", theme_color:"#A8C686", dimension_scores:{O:11,C:13,E:15,A:13,N:16} },
            "崔槿汐": { tagline:"奴婢愿一生一世服侍小主。", theme_color:"#8D6B94", dimension_scores:{O:12,C:19,E:13,A:19,N:6} },
            "夏冬春": { tagline:"赏你一丈红！", theme_color:"#FFB347", dimension_scores:{O:6,C:7,E:20,A:2,N:15} }
        };

        // 扩展分析内容（使用您提供的完整11个角色分析）
        const characterAnalyses = {
            "前期甄嬛·莞嫔": {
                overall_evaluation: "你是温柔理想主义型人格的典范，就像初入社会的新人，怀着对世界最美好的想象和期待，相信真诚的心能够打动一切坚硬的事物。你才华横溢，情感丰富，有着超越年龄的智慧和洞察力，但同时又保留着孩子般的天真和善意。在复杂的现实环境中，你就像一株温室中精心培育的兰花，美丽芬芳却经不起狂风暴雨的摧残。你的善良和真诚是你的底色，但也可能成为他人利用的弱点。你代表着人性中最纯粹美好的部分——对真善美的执着追求，对感情不计回报的付出，对理想世界的坚定信念。在残酷的现实中，你依然选择相信美好，这种坚守本身就是一种勇气。你的人生轨迹就像一首优雅的诗，在平仄中寻找韵律，在韵律中表达自我，哪怕偶尔有出格之处，那也是你对自由和真实的追求。",
                dimensions_analysis: {
                    O: "你的开放性维度得分极高，这让你对新事物保持着孩童般的好奇和热情，喜欢探索未知的领域，无论是艺术、文学还是哲学。你的想象力如天马行空，能够在平凡中发现不平凡，在寻常中看见诗意。你有着极高的审美品位，对美有着敏锐的感知力和独特的见解。在传统与创新之间，你能够找到巧妙的平衡——既尊重历史和文化的积淀，又勇于尝试新的表达方式和生活方式。你从不拘泥于既定的框架，总是能够在规则中找到自由呼吸的空间。你的思想开放而包容，能够理解并接纳不同的观点和文化，这种开放的心态让你在多元的世界中游刃有余，不断丰富自己的精神世界。",
                    C: "在尽责性维度上，你展现出适中的水平，做事认真细致，有着强烈的责任感和担当精神。在重要的事情上，你能够展现出惊人的专注力和执行力。你注重计划但又不被计划所束缚，能够在变化中灵活调整。你对承诺极为重视，一旦许下诺言就会竭尽全力去实现。在团队中，你是那个值得信赖的伙伴，能够承担起属于自己的责任。你对规则和秩序有着自己的理解——既尊重必要的规范和制度，又能够在适当的时候展现出灵活性和创造性。你的人生不是机械的按部就班，而是在秩序中寻找自由，在规范中创造可能。这种平衡让你既能够融入集体，又能够保持个性的独立。",
                    E: "你的外倾性处于中等偏高水平，这意味着你的社交风格温暖而适度，在熟悉的环境中能够自然地展现自己的开朗和热情。你善于倾听，也乐于表达，能够在交流中找到情感的共鸣。你的能量来源既包括与他人的深度连接，也包括独处的宁静时光。在群体中，你往往不是最耀眼的那个，但却是最让人感到舒适和安心的存在。你懂得社交的分寸，知道何时该展现自己，何时该保持沉默。你的人际关系网络不是广泛而肤浅的，而是深刻而有选择的。你珍视那些真诚的情感连接，愿意为真正在乎的人付出时间和精力。在独处与社交之间，你找到了属于自己的平衡点——既能享受人群的温暖，也能在独处中获得内心的平静。",
                    A: "你的宜人性得分极高，这说明你天生具有极强的共情能力，能够敏锐地感知他人的情绪和需求。你的善良不是表面的客套，而是发自内心的真诚关怀。在合作中，你总是能够站在对方的角度思考问题，寻求双赢的解决方案。你的信任是给予的，但也是有选择的——你愿意相信人性的美好，但也能分辨出虚伪和真诚。你在人际关系中追求的是真诚的互动和深厚的情感连接，而不是表面的应酬。你愿意为他人付出，但也懂得保护自己的情感边界。你的同理心让你成为优秀的倾听者和支持者，许多人会在困难时寻求你的帮助和安慰。在这个日益冷漠的世界里，你的善良和温暖是珍贵的礼物。",
                    N: "你的神经质维度得分较低，这表明你的情绪状态总体稳定，内心有着强大的韧性和恢复力。在面对一般的压力和挑战时，你能够保持冷静和理性。然而，在涉及重要人际关系和个人价值的问题上，你的情绪可能会有较大的波动。你敏感但不脆弱，能够从挫折中学习和成长。你的焦虑通常来自于对完美的追求和对他人感受的过度考虑。你有着良好的情绪调节能力，知道如何通过艺术、写作、与朋友交流等方式来处理负面情绪。你的情绪波动不是无端的发泄，而是对生活的深刻体验和反思。在压力面前，你可能会暂时退却，但最终总能找到重新出发的力量和勇气。"
                },
                life_portrait: "清晨的阳光透过纱帘洒在你精心布置的书桌上，那里摆放着几本正在阅读的书籍——一本诗集、一本艺术史、一本心理学著作。你保持着规律的作息，但从不刻板，周末会允许自己睡到自然醒，享受慵懒的晨光。你的社交圈小而深，每周会与两三位知心朋友相聚，或在咖啡馆深度交流，或一同参观艺术展览。家中总是收拾得温馨舒适，有鲜花点缀，有绿植相伴，是你和朋友们的安全港湾。遇到工作压力时，你会泡一壶茶，听一曲古琴，在平静中重新找回内心的平衡。你的生活空间既有传统的文房四宝，也有现代的智能设备，体现了你在传承与创新间的优雅平衡。周末午后，你可能会在阳台上阅读，或尝试新的菜谱，用美食探索不同文化的韵味。夜晚，你会写日记记录当天的感悟，或练习一段书法，在笔墨间安顿一天的思绪。",
                strengths: "你极其擅长需要创造力和情感共鸣的工作领域。在文学创作中，你能够用细腻的笔触描绘复杂的人性和情感；在艺术设计中，你有着独特的审美视角和表达能力；在教育领域，你能够用同理心和耐心引导学生成长；在心理咨询中，你的共情能力让你成为优秀的倾听者和引导者。你还擅长策划和文化活动组织，能够将艺术与生活巧妙地结合在一起。在团队协作中，你是那个能够凝聚人心、调和矛盾的角色。你的沟通能力出色，无论是书面表达还是口头交流，都能够准确而优美地传达思想和情感。在需要深度思考和创新解决方案的工作中，你往往能够提出独到的见解。你对美的敏感让你在视觉艺术、音乐、舞蹈等领域有着天然的禀赋。",
                weaknesses: "你不太擅长处理过于功利和竞争激烈的工作环境。在需要快速决断、承担巨大风险的情境中，你容易犹豫不决。你不擅长与人进行激烈的辩论和对抗，在冲突中往往选择退让而非坚持。对于重复机械、缺乏创造性的工作，你会感到枯燥和厌倦。在需要强烈自我推销和夸张表现的场合，你会感到不适和不自然。你也不擅长处理复杂的人际政治和权力斗争，容易被表面的真诚所蒙蔽。在需要极度理性和数据驱动的工作中，你的感性思维可能会成为障碍。你不善于拒绝他人的请求，即使这可能会损害自己的利益和时间。在面对批评和否定时，你容易产生自我怀疑和情绪低落。在需要长期坚持、但回报缓慢的事情上，你的耐心可能会受到考验。",

            "后期甄嬛·熹贵妃": {

        function getSimilarityLevel(percent) {
            if (percent >= 90) return '灵魂契合';
            if (percent >= 80) return '高度相似';
            if (percent >= 70) return '相当契合';
            if (percent >= 60) return '比较相似';
            if (percent >= 50) return '部分相似';
            return '略有相似';
        }
        
        function calculateAllSimilarities(userScores) {
            const userVector = [userScores.O||10,userScores.C||10,userScores.E||10,userScores.A||10,userScores.N||10];
            const matches = [];
            
            Object.keys(characterProfiles).forEach(name => {
                const char = characterProfiles[name];
                const charVector = [char.dimension_scores.O,char.dimension_scores.C,char.dimension_scores.E,char.dimension_scores.A,char.dimension_scores.N];
                
                let dot=0,norm1=0,norm2=0;
                for(let i=0;i<5;i++){ dot+=userVector[i]*charVector[i]; norm1+=userVector[i]*userVector[i]; norm2+=charVector[i]*charVector[i]; }
                const cosine = Math.sqrt(norm1)===0||Math.sqrt(norm2)===0?0:dot/(Math.sqrt(norm1)*Math.sqrt(norm2));
                
                let sumDiff=0; for(let i=0;i<5;i++) sumDiff+=Math.pow(userVector[i]-charVector[i],2);
                const maxDist = Math.sqrt(5*20*20);
                const distSimilarity = 1-(Math.sqrt(sumDiff)/maxDist);
                
                const total = 0.7*cosine + 0.3*distSimilarity;
                matches.push({
                    character:name,
                    similarity:Math.round(total*100),
                    profile:char,
                    analysis:characterAnalyses[name],
                    level:getSimilarityLevel(Math.round(total*100))
                });
            });
            
            return matches.sort((a,b)=>b.similarity-a.similarity);
        }
        
        function displayMainCharacter(match) {
            document.getElementById('mainCharacter').innerHTML = `
                <div class="character-name" style="color:${match.profile.theme_color}">${match.character}</div>
                <div class="character-tagline">${match.profile.tagline}</div>
                <div class="similarity-container">
                    <span class="similarity-percent">${match.similarity}%</span>
                    <div class="similarity-level">${match.level}</div>
                </div>
            `;
        }
        
        function displaySimilarCharacters(matches) {
            const html = matches.slice(1,3).map(m => `
                <div class="similar-character">
                    <div style="font-size:1.3rem;font-weight:bold;color:${m.profile.theme_color}">${m.character}</div>
                    <div style="color:#d4af37;font-weight:bold;margin:10px 0;">相似度: ${m.similarity}%</div>
                    <div style="color:#666;">${m.profile.tagline}</div>
                </div>
            `).join('');
            document.getElementById('similarCharacters').innerHTML = html;
        }
        
        function createRadarChart(userScores, charScores) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = Object.keys(dimensionNames).map(k=>dimensionNames[k]);
            const userData = Object.keys(dimensionNames).map(k=>userScores[k]||10);
            const charData = Object.keys(dimensionNames).map(k=>charScores[k]||10);
            
            console.log('创建雷达图:', { labels, userData, charData });
            
            if(window.radarChartInstance) window.radarChartInstance.destroy();
            
            window.radarChartInstance = new Chart(ctx, {
                type:'radar',
                data:{
                    labels:labels,
                    datasets:[
                        {label:'你的得分',data:userData,backgroundColor:'rgba(160,82,82,0.2)',borderColor:'#a05252',borderWidth:2},
                        {label:'角色标准分',data:charData,backgroundColor:'rgba(212,175,55,0.2)',borderColor:'#d4af37',borderWidth:2}
                    ]
                },
                options:{
                    responsive:true,
                    maintainAspectRatio:false,
                    scales:{r:{beginAtZero:true,max:20,ticks:{stepSize:5}}},
                    plugins:{legend:{position:'top'}}
                }
            });
        }
        
        function displayDimensionsAnalysis(analysis) {
            const html = Object.keys(dimensionNames).map(k => `
                <div class="dimension-card">
                    <div style="font-size:1.3rem;font-weight:bold;color:#a05252;margin-bottom:10px;">
                        <i class="${dimensionIcons[k]}"></i> ${dimensionNames[k]}
                    </div>
                    <div>${analysis.dimensions_analysis[k]||'该维度的具体分析内容。'}</div>
                </div>
            `).join('');
            document.getElementById('dimensionsAnalysis').innerHTML = html;
        }
        
        function displayOtherAnalyses(analysis) {
            document.getElementById('overallEvaluation').textContent = analysis.overall_evaluation;
            document.getElementById('lifePortrait').textContent = analysis.life_portrait;
            document.getElementById('strengthsWeaknesses').innerHTML = `<p><strong>擅长:</strong> ${analysis.strengths}</p><p><strong>不擅长:</strong> ${analysis.weaknesses}</p>`;
            document.getElementById('advantages').textContent = analysis.advantages;
            document.getElementById('disadvantages').textContent = analysis.disadvantages;
            document.getElementById('friendshipAdvice').textContent = analysis.friendship_advice;
            document.getElementById('careerAdvice').textContent = analysis.career_advice;
            document.getElementById('lifeAdvice').textContent = analysis.life_advice;
        }
        
        function captureScreenshot() {
            const notice = document.createElement('div');
            notice.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(212,175,55,0.9);color:#a05252;padding:15px;border-radius:10px;z-index:1000;font-weight:bold;';
            notice.textContent = '正在生成截图...';
            
            document.body.appendChild(notice);
            
            html2canvas(document.getElementById('content')).then(canvas => {
                const link = document.createElement('a');
                link.download = '我的甄嬛传人格测试结果.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                notice.textContent = '截图已保存！';
                setTimeout(() => notice.remove(), 2000);
            }).catch(err => {
                notice.textContent = '截图失败，请重试';
                setTimeout(() => notice.remove(), 2000);
            });
        }
        
        function restartTest() {
            // 清除所有sessionStorage数据
            sessionStorage.removeItem('zhenhuan_auth');
            sessionStorage.removeItem('zhenhuan_result');
            
            // 清除所有答案和测试数据
            // 跳转到首页，开始全新的测试
            window.location.href = 'index.html';
        }
        
        // 获取URL参数
        function getUrlParams() {
            const params = {};
            window.location.search.substring(1).split('&').forEach(pair => {
                const [key, value] = pair.split('=');
                if (key && value) params[decodeURIComponent(key)] = decodeURIComponent(value);
            });
            return params;
        }
        
        function initPage() {
            console.log('初始化结果页面...');
            const params = getUrlParams();
            console.log('URL参数:', params);
            
            const userScores = {
                O: parseInt(params.O) || 10,
                C: parseInt(params.C) || 10,
                E: parseInt(params.E) || 10,
                A: parseInt(params.A) || 10,
                N: parseInt(params.N) || 10
            };
            
            console.log('用户分数:', userScores);
            
            const matches = calculateAllSimilarities(userScores);
            const mainMatch = matches[0];
            
            console.log('最佳匹配:', mainMatch);
            console.log('角色分数:', mainMatch.profile.dimension_scores);
            
            displayMainCharacter(mainMatch);
            createRadarChart(userScores, mainMatch.profile.dimension_scores);
            displaySimilarCharacters(matches);
            displayDimensionsAnalysis(mainMatch.analysis);
            displayOtherAnalyses(mainMatch.analysis);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            document.getElementById('shareBtn').addEventListener('click', captureScreenshot);
            document.getElementById('restartBtn').addEventListener('click', restartTest);
            
            console.log('页面初始化完成');
        }
        
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
