    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: linear-gradient(135deg, #f5e6e8 0%, #f0d9da 50%, #e8ccd3 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(160, 82, 82, 0.3);
            border: 3px solid #a05252;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #a05252, #d4af37, #a05252);
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(160, 82, 82, 0.2);
            position: relative;
        }

        .title {
            color: #a05252;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
            font-style: italic;
        }

        .progress-container {
            margin-bottom: 40px;
            background: rgba(160, 82, 82, 0.1);
            border-radius: 15px;
            padding: 20px;
            position: relative;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #a05252;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .progress-bar {
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9aa2, #ff5c71, #a05252);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-container {
            margin-bottom: 40px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-number {
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .question-number i {
            margin-right: 10px;
        }

        .question-text {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #444;
            padding: 20px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 15px;
            border-left: 4px solid #d4af37;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
        }

        .option {
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            position: relative;
        }

        .option:hover {
            border-color: #a05252;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(160, 82, 82, 0.1);
        }

        .option.selected {
            border-color: #a05252;
            background: linear-gradient(135deg, rgba(160, 82, 82, 0.1) 0%, rgba(212, 175, 55, 0.1) 100%);
            color: #a05252;
            font-weight: bold;
        }

        .option.selected::before {
            content: '✓';
            position: absolute;
            right: 15px;
            top: 15px;
            color: #a05252;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .option-label {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 15px;
            flex-shrink: 0;
            font-weight: bold;
            color: #666;
        }

        .option.selected .option-label {
            background: #a05252;
            color: white;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            flex: 1;
            padding: 18px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-btn.prev {
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            color: #666;
        }

        .nav-btn.prev:hover {
            background: linear-gradient(135deg, #e0e0e0 0%, #d0d0d0 100%);
            transform: translateY(-3px);
        }

        .nav-btn.next {
            background: linear-gradient(135deg, #a05252 0%, #c0392b 100%);
            color: white;
        }

        .nav-btn.next:hover {
            background: linear-gradient(135deg, #c0392b 0%, #a05252 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(160, 82, 82, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .nav-btn:disabled:hover {
            transform: none !important;
            box-shadow: none !important;
        }

        .dimension-info {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(160, 82, 82, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(160, 82, 82, 0.2);
        }

        .dimension {
            text-align: center;
            padding: 10px 15px;
            border-radius: 10px;
            background: white;
            min-width: 120px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .dimension-name {
            font-weight: bold;
            color: #a05252;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .dimension-score {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d4af37;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(160, 82, 82, 0.2);
            color: #777;
            font-size: 0.9rem;
        }

        .error-message {
            background-color: rgba(231, 76, 60, 0.1);
            color: #c0392b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid rgba(231, 76, 60, 0.3);
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .decoration {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(212, 175, 55, 0.2);
            z-index: -1;
        }

        .decoration.top-left {
            top: 20px;
            left: 20px;
            transform: rotate(-15deg);
        }

        .decoration.top-right {
            top: 20px;
            right: 20px;
            transform: rotate(15deg);
        }

        .decoration.bottom-left {
            bottom: 20px;
            left: 20px;
            transform: rotate(15deg);
        }

        .decoration.bottom-right {
            bottom: 20px;
            right: 20px;
            transform: rotate(-15deg);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;

            }

                font-size: 1.3rem;
                padding: 15px;
            }

            .option {

                padding: 15px 20px;
                font-size: 1.1rem;
            }

            .dimension {

            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.7rem;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .dimension {
                min-width: 80px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

                    {text: "创意者，提供新思路", scores: {O: 2, C: -1, E: 0, A: 0, N: 0}}
                ]
            },
            {
                question: "面对批评时，你的第一反应是？",
                options: [
                    {text: "反思自己，有则改之", scores: {O: 1, C: 1, E: -1, A: 2, N: -1}},
                    {text: "感到不快，需要时间消化", scores: {O: -1, C: -1, E: -1, A: -1, N: 2}},
                    {text: "立即辩解，维护自己", scores: {O: 0, C: 0, E: 2, A: -1, N: 0}},
                    {text: "分析批评的合理性", scores: {O: 2, C: 1, E: 0, A: 0, N: 0}}
                ]
            },
            {
                question: "你认为生活的意义在于？",
                options: [
                    {text: "不断成长，实现自我", scores: {O: 2, C: 1, E: 1, A: 0, N: -1}},
                    {text: "建立深厚的人际关系", scores: {O: 0, C: 0, E: 2, A: 2, N: 0}},
                    {text: "安稳平静，岁月静好", scores: {O: -1, C: 1, E: -1, A: 1, N: 1}},
                    {text: "追求真理，探索世界", scores: {O: 2, C: 0, E: 0, A: 0, N: -1}}
                ]
            },
            {
                question: "当你感到孤独时，你会？",
                options: [
                    {text: "享受独处，思考人生", scores: {O: 1, C: 0, E: -2, A: 0, N: 1}},
                    {text: "主动联系朋友或家人", scores: {O: 0, C: 0, E: 2, A: 2, N: -1}},
                    {text: "感到悲伤，难以自拔", scores: {O: -1, C: -1, E: -1, A: -1, N: 2}},
                    {text: "寻找新活动，充实自己", scores: {O: 1, C: 1, E: 1, A: 0, N: -1}}
                ]
            }
        ];

        // 维度名称映射
        const dimensionNames = {
            'O': '开放性',
            'C': '尽责性', 
            'E': '外倾性',
            'A': '宜人性',
            'N': '神经质'
        };

        // 维度颜色
        const dimensionColors = {
            'O': '#4CAF50',
            'C': '#2196F3',
            'E': '#FF9800',
            'A': '#E91E63',
            'N': '#9C27B0'
        };

        // 用户数据
        let userAnswers = Array(testQuestions.length).fill(null);
        let userScores = { O: 10, C: 10, E: 10, A: 10, N: 10 }; // 基础分10分
        let currentQuestionIndex = 0;

        // DOM元素
        const questionIndexEl = document.getElementById('questionIndex');
        const questionTextEl = document.getElementById('questionText');
        const optionsContainerEl = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressTextEl = document.getElementById('progressText');
        const progressFillEl = document.getElementById('progressFill');
        const errorMessageEl = document.getElementById('errorMessage');
        const dimensionInfoEl = document.getElementById('dimensionInfo');

        // 初始化
        function init() {
            // 从sessionStorage恢复用户数据
            const savedData = sessionStorage.getItem('zhenhuan_test_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                userAnswers = data.answers;
                userScores = data.scores;
                currentQuestionIndex = data.currentIndex || 0;
            }
            
            updateProgress();
            displayQuestion(currentQuestionIndex);
            updateNavigationButtons();
            updateDimensionInfo();
        }

        // 显示问题
        function displayQuestion(index) {
            const question = testQuestions[index];
            
            questionIndexEl.textContent = index + 1;
            questionTextEl.textContent = question.question;
            
            // 清空选项容器
            optionsContainerEl.innerHTML = '';
            
            // 生成选项
            question.options.forEach((option, optionIndex) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                if (userAnswers[index] === optionIndex) {
                    optionEl.classList.add('selected');
                }
                
                optionEl.innerHTML = `
                    <div class="option-label">${String.fromCharCode(65 + optionIndex)}</div>
                    <div class="option-text">${option.text}</div>
                `;
                
                optionEl.addEventListener('click', () => selectOption(index, optionIndex));
                optionsContainerEl.appendChild(optionEl);
            });
            
            // 更新进度
            updateProgress();
        }

        // 选择选项
        function selectOption(questionIndex, optionIndex) {
            const previousAnswer = userAnswers[questionIndex];
            
            // 更新用户答案
            userAnswers[questionIndex] = optionIndex;
            
            // 更新选项UI
            const options = optionsContainerEl.querySelectorAll('.option');
            options.forEach((option, index) => {
                if (index === optionIndex) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
            
            // 更新分数
            updateScores(questionIndex, previousAnswer, optionIndex);
            
            // 隐藏错误消息
            errorMessageEl.classList.remove('show');
            
            // 保存数据
            saveUserData();
        }

        // 更新分数
        function updateScores(questionIndex, previousAnswer, newAnswer) {
            const question = testQuestions[questionIndex];
            
            // 如果之前有选择，先减去之前的分数
            if (previousAnswer !== null && previousAnswer !== undefined) {
                const prevOption = question.options[previousAnswer];
                Object.keys(prevOption.scores).forEach(dimension => {
                    userScores[dimension] -= prevOption.scores[dimension];
                });
            }
            
            // 加上新的分数
            const newOption = question.options[newAnswer];
            Object.keys(newOption.scores).forEach(dimension => {
                userScores[dimension] += newOption.scores[dimension];
            });
            
            // 确保分数在0-20范围内
            Object.keys(userScores).forEach(dimension => {
                userScores[dimension] = Math.max(0, Math.min(20, userScores[dimension]));
            });
            
            // 更新维度显示
            updateDimensionInfo();
        }

        // 更新维度信息显示
        function updateDimensionInfo() {
            dimensionInfoEl.innerHTML = '';
            
            Object.keys(userScores).forEach(dimension => {
                const dimensionEl = document.createElement('div');
                dimensionEl.className = 'dimension';
                dimensionEl.innerHTML = `
                    <div class="dimension-name">${dimensionNames[dimension]}</div>
                    <div class="dimension-score">${userScores[dimension]}</div>
                `;
                dimensionInfoEl.appendChild(dimensionEl);
            });
        }

        // 更新进度
        function updateProgress() {
            const answeredCount = userAnswers.filter(answer => answer !== null).length;
            const progressPercentage = (answeredCount / testQuestions.length) * 100;
            
            progressTextEl.textContent = `${answeredCount}/${testQuestions.length}`;
            progressFillEl.style.width = `${progressPercentage}%`;
        }

        // 更新导航按钮
        function updateNavigationButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            
            // 如果是最后一题，修改按钮文本
            if (currentQuestionIndex === testQuestions.length - 1) {
                nextBtn.innerHTML = '查看结果 <i class="fas fa-gem"></i>';
            } else {
                nextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
            }
        }

        // 上一题
        function goToPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion(currentQuestionIndex);
                updateNavigationButtons();
            }
        }

        // 下一题/查看结果
        function goToNextQuestion() {
            // 检查是否已回答当前问题
            if (userAnswers[currentQuestionIndex] === null) {
                errorMessageEl.classList.add('show');
                return;
            }
            
            // 如果是最后一题，进入结果页面
            if (currentQuestionIndex === testQuestions.length - 1) {
                calculateAndGoToResult();
                return;
            }
            
            // 否则进入下一题
            currentQuestionIndex++;
            displayQuestion(currentQuestionIndex);
            updateNavigationButtons();
        }

        // 计算并跳转到结果页面
        function calculateAndGoToResult() {
            // 计算与角色的匹配度
            const matchResult = calculateCharacterMatch();
            
            // 保存结果数据
            sessionStorage.setItem('zhenhuan_result', JSON.stringify({
                character: matchResult.character,
                similarity: matchResult.similarity,
                scores: userScores,
                allMatches: matchResult.allMatches
            }));
            
            // 跳转到结果页面，传递所有必要的参数
            window.location.href = `result.html?character=${encodeURIComponent(matchResult.character)}&similarity=${matchResult.similarity}&O=${userScores.O}&C=${userScores.C}&E=${userScores.E}&A=${userScores.A}&N=${userScores.N}`;
        }

        // 计算角色匹配度
        function calculateCharacterMatch() {
            // 角色模型数据 - 使用与result.html相同的完整数据
            const characterProfiles = {
                "前期甄嬛·莞嫔": { dimension_scores:{O:16,C:12,E:14,A:18,N:8} },
                "后期甄嬛·熹贵妃": { dimension_scores:{O:17,C:18,E:15,A:10,N:6} },
                "沈眉庄": { dimension_scores:{O:12,C:19,E:13,A:19,N:5} },
                "皇后宜修": { dimension_scores:{O:10,C:20,E:11,A:4,N:18} },
                "华妃年世兰": { dimension_scores:{O:13,C:5,E:20,A:3,N:19} },
                "安陵容": { dimension_scores:{O:15,C:16,E:8,A:12,N:20} },
                "叶澜依": { dimension_scores:{O:18,C:4,E:8,A:15,N:6} },
                "敬妃": { dimension_scores:{O:10,C:15,E:13,A:18,N:9} },
                "浣碧": { dimension_scores:{O:11,C:13,E:15,A:13,N:16} },
                "崔槿汐": { dimension_scores:{O:12,C:19,E:13,A:19,N:6} },
                "夏冬春": { dimension_scores:{O:6,C:7,E:20,A:2,N:15} }
            };
            
            // 计算与所有角色的相似度
            const userVector = [userScores.O, userScores.C, userScores.E, userScores.A, userScores.N];
            const matches = [];
            
            Object.keys(characterProfiles).forEach(characterName => {
                const character = characterProfiles[characterName];
                const charVector = [character.dimension_scores.O, character.dimension_scores.C, character.dimension_scores.E, character.dimension_scores.A, character.dimension_scores.N];
                
                // 计算余弦相似度
                const cosineSimilarity = calculateCosineSimilarity(userVector, charVector);
                
                // 计算欧几里得距离相似度
                const distanceSimilarity = calculateDistanceSimilarity(userVector, charVector);
                
                // 综合相似度（加权平均）
                const totalSimilarity = 0.7 * cosineSimilarity + 0.3 * distanceSimilarity;
                
                // 转换为百分比
                const similarityPercent = Math.round(totalSimilarity * 100);
                
                matches.push({
                    character: characterName,
                    similarity: similarityPercent,
                    profile: character
                });
            });
            
            // 按相似度排序
            matches.sort((a, b) => b.similarity - a.similarity);
            
            return {
                character: matches[0].character,
                similarity: matches[0].similarity,
                allMatches: matches
            };
        }

        // 计算余弦相似度
        function calculateCosineSimilarity(vec1, vec2) {
            let dotProduct = 0;
            let norm1 = 0;
            let norm2 = 0;
            
            for (let i = 0; i < vec1.length; i++) {
                dotProduct += vec1[i] * vec2[i];
                norm1 += vec1[i] * vec1[i];
                norm2 += vec2[i] * vec2[i];
            }
            
            norm1 = Math.sqrt(norm1);
            norm2 = Math.sqrt(norm2);
            
            if (norm1 === 0 || norm2 === 0) return 0;
            return dotProduct / (norm1 * norm2);
        }

        // 计算距离相似度
        function calculateDistanceSimilarity(vec1, vec2) {
            let sumSquaredDiff = 0;
            const maxDistance = Math.sqrt(5 * 20 * 20); // 最大可能距离
            
            for (let i = 0; i < vec1.length; i++) {
                sumSquaredDiff += Math.pow(vec1[i] - vec2[i], 2);
            }
            
            const distance = Math.sqrt(sumSquaredDiff);
            return 1 - (distance / maxDistance);
        }

        // 保存用户数据
        function saveUserData() {
            const data = {
                answers: userAnswers,
                scores: userScores,
                currentIndex: currentQuestionIndex
            };
            sessionStorage.setItem('zhenhuan_test_data', JSON.stringify(data));
        }

        // 事件监听
        prevBtn.addEventListener('click', goToPreviousQuestion);
        nextBtn.addEventListener('click', goToNextQuestion);

        // 初始化应用
        init();
    </script>
